<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SBTI 傻大人格测试</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            animation: bg 10s linear infinite alternate;
        }

        @keyframes bg {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(20deg); }
        }

        .box {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            font-size: 26px;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .question {
            font-size: 16px;
            margin: 15px 0;
            padding: 15px;
            background: #f7f8ff;
            border-left: 4px solid #764ba2;
            border-radius: 10px;
        }

        .option {
            display: block;
            padding: 10px 14px;
            background: #f1f3ff;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
        }

        .option:hover {
            background: #d5d9ff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            margin-top: 20px;
            cursor: pointer;
        }

        .result {
            text-align: center;
            animation: zoom 0.6s ease;
        }

        @keyframes zoom {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .icon {
            font-size: 70px;
            margin: 20px 0;
        }

        .name {
            font-size: 26px;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 16px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .share {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .share button {
            width: auto;
            padding: 8px 16px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="box" id="app"></div>
    <script>
        const questions = [
            { id: 1, q: "早上闹钟响了，你会？", opts: ["立刻起床", "赖床5分钟", "直接关掉继续睡"] },
            { id: 2, q: "朋友临时约你出门，你会？", opts: ["马上准备出发", "犹豫一下再去", "找借口拒绝"] },
            { id: 3, q: "工作/学习时，你更像？", opts: ["专注认真", "偶尔摸鱼", "全程摆烂"] },
            { id: 4, q: "看到未读消息，你会？", opts: ["立刻回", "有空再回", "假装没看见"] },
            { id: 5, q: "聚会时你通常是？", opts: ["活跃气氛担当", "跟着大家玩", "安静角落待着"] },
            { id: 6, q: "出门前要花多久准备？", opts: ["10分钟内", "半小时左右", "一小时以上"] },
            { id: 7, q: "别人批评你，你会？", opts: ["认真反思", "表面同意内心不服", "直接怼回去"] },
            { id: 8, q: "周末首选活动是？", opts: ["出门逛街", "宅家追剧", "睡觉睡到自然醒"] },
            { id: 9, q: "你做事的风格是？", opts: ["提前规划", "想到啥做啥", "拖到最后一刻"] },
            { id: 10, q: "遇到麻烦，你会？", opts: ["主动解决", "找人帮忙", "逃避不管"] },
            { id: 11, q: "你更爱哪种饮料？", opts: ["奶茶咖啡", "白开水", "碳酸饮料"] },
            { id: 12, q: "你熬夜的原因是？", opts: ["工作学习", "刷手机玩", "纯失眠"] },
            { id: 13, q: "你点菜时会？", opts: ["快速决定", "纠结半天", "让别人帮点"] },
            { id: 14, q: "你手机电量剩多少会慌？", opts: ["50%以下", "20%以下", "从不慌"] },
            { id: 15, q: "你更像哪种性格？", opts: ["乐观开朗", "情绪稳定", "容易内耗"] },
            { id: 16, q: "别人借钱不还，你会？", opts: ["主动提醒", "不好意思要", "算了不要了"] },
            { id: 17, q: "你更喜欢？", opts: ["热闹环境", "安静环境", "无所谓"] },
            { id: 18, q: "你拍照会？", opts: ["立刻发朋友圈", "存着不发", "从不拍照"] },
            { id: 19, q: "你生气时会？", opts: ["直接爆发", "默默忍", "冷静沟通"] },
            { id: 20, q: "你更爱刷什么视频？", opts: ["搞笑段子", "知识学习", "美食美妆"] },
            { id: 21, q: "你丢了东西会？", opts: ["疯狂寻找", "算了认命", "骂骂咧咧"] },
            { id: 22, q: "你说话风格是？", opts: ["直来直去", "委婉含蓄", "少言寡语"] },
            { id: 23, q: "你洗澡速度？", opts: ["10分钟搞定", "20分钟", "半小时以上"] },
            { id: 24, q: "你压力大时会？", opts: ["运动发泄", "大吃一顿", "躺平摆烂"] },
            { id: 25, q: "你更相信？", opts: ["自己", "别人", "命运"] },
            { id: 26, q: "你整理东西的频率？", opts: ["每天整理", "一周一次", "从不整理"] },
            { id: 27, q: "你网购会？", opts: ["立刻下单", "比价半天", "只逛不买"] },
            { id: 28, q: "你对未来的态度？", opts: ["充满期待", "走一步看一步", "焦虑迷茫"] },
            { id: 29, q: "你更爱吃？", opts: ["甜口", "咸口", "辣口"] },
            { id: 30, q: "你社交软件状态？", opts: ["经常在线", "偶尔上线", "常年隐身"] },
            { id: 31, q: "你喝酒吗？（隐藏题）", opts: ["滴酒不沾", "偶尔小酌", "无酒不欢"] }
        ];

        const personalities = [
            { score: 33, name: "DEAD 死者型", desc: "灵魂已升天，肉体还在上班", icon: "💀" },
            { score: 37, name: "MALO 吗喽型", desc: "人类世界的过客，猴子才是本体", icon: "🐒" },
            { score: 42, name: "DRUNK 酒鬼型", desc: "白天正常人，晚上酒精人", icon: "🍺" },
            { score: 47, name: "摆烂大王", desc: "努力没用，躺平万岁", icon: "🛌" },
            { score: 52, name: "佛系咸鱼", desc: "不争不抢，岁月静好", icon: "🐟" },
            { score: 57, name: "社恐隐身人", desc: "能打字不语音，能线上不见面", icon: "🥷" },
            { score: 62, name: "快乐修狗", desc: "没心没肺，快乐加倍", icon: "🐶" },
            { score: 999, name: "人间清醒", desc: "看透一切，理智在线", icon: "🧠" }
        ];

        let app = document.getElementById('app');

        function renderTest() {
            let html = `
                <div class="title">🧠 SBTI 傻大人格测试</div>
                <div class="subtitle">31题测出你的真实隐藏人格</div>
                <form id="form">
            `;
            questions.forEach((q, idx) => {
                html += `<div class="question">${q.id}. ${q.q}</div>`;
                q.opts.forEach((opt, i) => {
                    html += `
                        <label class="option">
                            <input type="radio" name="q${q.id}" value="${i+1}" required> ${opt}
                        </label>
                    `;
                });
            });
            html += `<button type="submit">🚀 查看我的人格</button></form>`;
            app.innerHTML = html;

            document.getElementById('form').addEventListener('submit', e => {
                e.preventDefault();
                let ans = [];
                questions.forEach(q => {
                    let v = document.querySelector(`input[name="q${q.id}"]:checked`).value;
                    ans.push(+v);
                });
                showResult(ans);
            });
        }

        function showResult(ans) {
            let total = ans.reduce((a,b)=>a+b,0);
            let res = personalities.find(p => total <= p.score);
            if (ans[30] === 3) res = { name: "DRUNK 酒鬼型", desc: "白天正常人，晚上酒精人", icon: "🍺" };

            app.innerHTML = `
                <div class="result">
                    <div class="icon">${res.icon}</div>
                    <div class="name">${res.name}</div>
                    <div class="desc">${res.desc}</div>
                    <div class="share">
                        <button onclick="alert('分享到微信')">微信</button>
                        <button onclick="alert('分享到微博')">微博</button>
                    </div>
                    <button onclick="location.reload()">再测一次</button>
                </div>
            `;
        }

        renderTest();
    </script>
</body>
</html>
